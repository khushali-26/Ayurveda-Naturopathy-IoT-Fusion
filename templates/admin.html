<!DOCTYPE html>

<html>

<head>

<title>Organizer Login</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.login{

    width:350px;
    margin:120px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

input{

    width:90%;
    padding:12px;
    margin:15px 0;
}

button{

    background:#2e7d32;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{

    background:#1b5e20;
}

</style>

</head>

<body>

<div class="login">

<h2>Organizer Login</h2>

<form method="POST">

<input
type="password"
name="password"
placeholder="Enter Organizer Password"
required>

<br>

<button>

Login

</button>

</form>

</div>

</body>

</html>
